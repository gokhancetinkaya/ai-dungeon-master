apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: ai-dungeon-master
data:
  TRITON_TEXT_URL: "triton-text-service:8001"
  TRITON_IMAGE_URL: "triton-image-service:8001"
  LOG_LEVEL: "INFO"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: ai-dungeon-master
  labels:
    app: fastapi
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
        component: gateway
    spec:
      # Wait for Triton to be ready before starting FastAPI
      initContainers:
      - name: wait-for-triton
        image: busybox:latest
        command: ['sh', '-c']
        args:
          - |
            echo "Waiting for Triton text model service to be ready..."
            until wget -q -O- http://triton-text-service:8000/v2/health/ready 2>/dev/null; do
              echo "Triton text model not ready yet, waiting 10s..."
              sleep 10
            done
            echo "Triton text model is ready!"
            
            echo "Waiting for Triton image model service to be ready..."
            until wget -q -O- http://triton-image-service:8000/v2/health/ready 2>/dev/null; do
              echo "Triton image model not ready yet, waiting 10s..."
              sleep 10
            done
            echo "Triton image model is ready!"
            echo "All Triton services are ready, starting FastAPI..."
      containers:
      - name: fastapi
        image: localhost:32000/ai-dungeon-master-fastapi:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: TRITON_TEXT_URL
          valueFrom:
            configMapKeyRef:
              name: fastapi-config
              key: TRITON_TEXT_URL
        - name: TRITON_IMAGE_URL
          valueFrom:
            configMapKeyRef:
              name: fastapi-config
              key: TRITON_IMAGE_URL
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: fastapi-config
              key: LOG_LEVEL
        resources:
          limits:
            memory: "2Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  namespace: ai-dungeon-master
  labels:
    app: fastapi
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  selector:
    app: fastapi

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-hpa
  namespace: ai-dungeon-master
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

