apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: ai-dungeon-master
data:
  API_URL: "http://fastapi-service:8000"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-dungeon-master
  labels:
    app: frontend
    component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        component: ui
    spec:
      containers:
      - name: streamlit
        image: localhost:32000/ai-dungeon-master-streamlit:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
          name: http
        env:
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: frontend-config
              key: API_URL
        resources:
          limits:
            memory: "1Gi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: ai-dungeon-master
  labels:
    app: frontend
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8501
    nodePort: 30080
    name: http
  selector:
    app: frontend

